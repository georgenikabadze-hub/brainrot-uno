<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Brainrot UNO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:#1a0a2e; color:#fff; overflow:hidden; height:100dvh; width:100vw; touch-action:manipulation; }

/* ── Screens ── */
.screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:300; }
.screen.active { display:flex; }

/* ── Menu ── */
.menu { background:linear-gradient(135deg,#1a0a2e,#2d1b69); }
.menu h1 { font-size:38px; text-shadow:0 0 20px rgba(255,107,0,0.5); }
.menu .subtitle { font-size:16px; color:#aaa; }
.menu .char-row { display:flex; gap:6px; }
.menu .char-row img { width:56px; height:56px; object-fit:contain; }
.btn-group { display:flex; flex-direction:column; gap:12px; width:260px; }
.btn { padding:16px 36px; font-size:20px; font-weight:700; border:none; border-radius:16px; cursor:pointer; color:#fff; transition:transform 0.1s; text-align:center; }
.btn:active { transform:scale(0.95); }
.btn-orange { background:#ff6b00; }
.btn-purple { background:#6b21a8; }
.btn-dark { background:rgba(255,255,255,0.1); font-size:16px; }

/* ── Lobby ── */
.lobby { background:linear-gradient(135deg,#0f172a,#1e293b); padding:20px; }
.room-code { font-size:52px; font-weight:900; letter-spacing:12px; color:#ff6b00; text-shadow:0 0 20px rgba(255,107,0,0.4); }
.room-code-label { font-size:14px; color:#94a3b8; margin-bottom:-8px; }
.player-slots { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin:16px 0; }
.player-slot { width:110px; padding:12px; border-radius:16px; background:rgba(255,255,255,0.05); border:2px dashed rgba(255,255,255,0.15); text-align:center; display:flex; flex-direction:column; align-items:center; gap:6px; }
.player-slot.filled { border:2px solid #ff6b00; background:rgba(255,107,0,0.1); }
.player-slot.you { border-color:#22c55e; background:rgba(34,197,94,0.1); }
.player-slot img { width:48px; height:48px; object-fit:contain; }
.player-slot .slot-name { font-size:12px; font-weight:600; }
.player-slot .slot-empty { font-size:24px; opacity:0.3; }
.share-hint { font-size:13px; color:#64748b; text-align:center; max-width:280px; }

/* ── Join ── */
.join { background:linear-gradient(135deg,#0f172a,#1e293b); padding:20px; }
.code-input { display:flex; gap:8px; }
.code-input input { width:52px; height:64px; text-align:center; font-size:28px; font-weight:900; border-radius:12px; border:2px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); color:#fff; text-transform:uppercase; }
.code-input input:focus { border-color:#ff6b00; outline:none; }
.char-pick { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:320px; }
.char-option { width:60px; height:60px; border-radius:14px; border:3px solid transparent; cursor:pointer; padding:4px; background:rgba(255,255,255,0.05); transition:all 0.15s; display:flex; align-items:center; justify-content:center; }
.char-option img { width:44px; height:44px; object-fit:contain; }
.char-option.selected { border-color:#ff6b00; background:rgba(255,107,0,0.15); transform:scale(1.1); }
.char-option.taken { opacity:0.25; pointer-events:none; }
.error-msg { color:#ef4444; font-size:14px; min-height:20px; }

/* ── Table ── */
.table { width:100vw; height:100dvh; background:radial-gradient(ellipse at center,#1e3a1e 0%,#0d1f0d 70%); position:relative; overflow:hidden; }
.table::before { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:70vmin; height:70vmin; border-radius:50%; border:3px solid rgba(255,255,255,0.08); }

.center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); display:flex; gap:12px; align-items:center; z-index:10; }
.pile-card { width:100px; height:145px; border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:36px; box-shadow:0 4px 20px rgba(0,0,0,0.5); border:3px solid rgba(255,255,255,0.3); cursor:pointer; transition:transform 0.15s; }
.pile-card:hover { transform:scale(1.05); }
.draw-pile { background:linear-gradient(135deg,#2d1b69,#1a0a2e); font-size:16px; font-weight:bold; text-align:center; line-height:1.3; }

.player-area { position:absolute; display:flex; flex-direction:column; align-items:center; gap:4px; z-index:15; }
.seat-0 { bottom:8px; left:50%; transform:translateX(-50%); }
.seat-1 { left:8px; top:50%; transform:translateY(-50%); }
.seat-2 { top:8px; left:50%; transform:translateX(-50%); }
.seat-3 { right:8px; top:50%; transform:translateY(-50%); }

.player-label { font-size:13px; font-weight:700; padding:4px 12px; border-radius:20px; background:rgba(0,0,0,0.6); white-space:nowrap; display:flex; align-items:center; gap:4px; }
.player-label.active::before { content:''; display:inline-block; width:12px; height:12px; background:#ff2020; border-radius:50%; box-shadow:0 0 8px #ff2020; animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.player-avatar { width:24px; height:24px; object-fit:contain; }
.player-cards { display:flex; }
.seat-1 .player-cards,.seat-3 .player-cards { flex-direction:column; }
.card-count { font-size:11px; background:rgba(255,255,255,0.2); padding:2px 8px; border-radius:10px; }

/* ── Cards ── */
.card { width:90px; height:130px; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:28px; box-shadow:0 2px 8px rgba(0,0,0,0.4); border:2px solid rgba(255,255,255,0.2); transition:transform 0.15s; cursor:default; flex-shrink:0; }
.card.small { width:40px; height:60px; font-size:16px; border-radius:8px; }
.card-label { font-size:10px; font-weight:700; margin-top:4px; text-shadow:0 1px 2px rgba(0,0,0,0.5); }
.card.small .card-label { font-size:6px; }
.card-img { width:52px; height:52px; object-fit:contain; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.4)); }
.card.small .card-img { width:22px; height:22px; }
.pile-card .card-img { width:60px; height:60px; }

.card.playable { cursor:pointer; border-color:rgba(255,255,0,0.6); }
.card.playable:hover { transform:translateY(-15px) scale(1.1); z-index:20; box-shadow:0 8px 25px rgba(255,255,0,0.3); }

.card-back { background:linear-gradient(135deg,#2d1b69,#1a0a2e); }
.card-back::after { content:'🦈'; font-size:20px; }

.card-red { background:linear-gradient(135deg,#e74c3c,#c0392b); }
.card-blue { background:linear-gradient(135deg,#3498db,#2980b9); }
.card-green { background:linear-gradient(135deg,#2ecc71,#27ae60); }
.card-yellow { background:linear-gradient(135deg,#f1c40f,#f39c12); color:#333; }
.card-wild { background:linear-gradient(135deg,#e74c3c,#3498db,#2ecc71,#f1c40f); }

/* ── UNO button ── */
.uno-btn { position:absolute; bottom:150px; right:20px; background:#ff6b00; color:#fff; border:none; padding:14px 28px; border-radius:50%; font-size:20px; font-weight:900; cursor:pointer; z-index:20; box-shadow:0 4px 15px rgba(255,107,0,0.5); display:none; }
.uno-btn.visible { display:block; animation:pop 0.4s; }
@keyframes pop { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }

/* ── Color picker ── */
.color-picker { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); display:none; z-index:100; background:rgba(0,0,0,0.92); border-radius:20px; padding:20px; text-align:center; }
.color-picker.visible { display:block; }
.color-picker h3 { margin-bottom:12px; font-size:16px; }
.color-options { display:flex; gap:12px; }
.color-option { width:50px; height:50px; border-radius:50%; cursor:pointer; border:3px solid #fff; transition:transform 0.1s; }
.color-option:hover { transform:scale(1.2); }
.color-option.red { background:#e74c3c; }
.color-option.blue { background:#3498db; }
.color-option.green { background:#2ecc71; }
.color-option.yellow { background:#f1c40f; }

/* ── Toast ── */
.toast { position:absolute; top:38%; left:50%; transform:translate(-50%,-50%); font-size:24px; font-weight:900; padding:10px 24px; border-radius:14px; background:rgba(0,0,0,0.85); z-index:50; pointer-events:none; opacity:0; transition:opacity 0.3s; text-align:center; }
.toast.visible { opacity:1; }

/* ── Game over ── */
.game-over { position:absolute; inset:0; background:rgba(0,0,0,0.88); display:none; z-index:200; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
.game-over.visible { display:flex; }
.game-over h1 { font-size:42px; text-align:center; }
.game-over .winner-img { width:100px; height:100px; object-fit:contain; }

/* ── Mobile ── */
@media(max-width:600px) {
  .card { width:78px; height:112px; font-size:22px; }
  .card.small { width:34px; height:50px; }
  .card-img { width:46px; height:46px; }
  .card-label { font-size:9px; }
  .pile-card { width:88px; height:126px; }
  .pile-card .card-img { width:54px; height:54px; }
  .seat-0 { bottom:4px; }
  .uno-btn { bottom:130px; }
  .room-code { font-size:42px; letter-spacing:8px; }
  .menu h1 { font-size:30px; }
}
</style>
</head>
<body>

<!-- ═══ MENU ═══ -->
<div class="screen menu active" id="menuScreen">
  <div class="char-row">
    <img src="https://www.playbrainrot.org/images/characters/tralalero-tralala.webp" alt="">
    <img src="https://www.playbrainrot.org/images/characters/bombardiro-crocodilo.webp" alt="">
    <img src="https://www.playbrainrot.org/images/characters/cappuccino-assassino.webp" alt="">
    <img src="https://www.playbrainrot.org/images/characters/ballerina-cappuccina.webp" alt="">
  </div>
  <h1>BRAINROT UNO</h1>
  <p class="subtitle">ტრალალერო ტრალალა × ბომბარდირო კროკოდილო</p>
  <div class="btn-group">
    <button class="btn btn-orange" onclick="startSolo()">მარტო თამაში 🤖</button>
    <button class="btn btn-purple" onclick="showCreate()">ოთახის შექმნა 🏠</button>
    <button class="btn btn-dark" onclick="showJoin()">ოთახში შესვლა 🔑</button>
  </div>
</div>

<!-- ═══ LOBBY ═══ -->
<div class="screen lobby" id="lobbyScreen">
  <p class="room-code-label">ოთახის კოდი — გაუგზავნე მეგობრებს</p>
  <div class="room-code" id="roomCodeEl">----</div>
  <div class="player-slots" id="playerSlots"></div>
  <button class="btn btn-orange" id="startBtn" style="display:none" onclick="hostStart()">დაწყება 🎮</button>
  <button class="btn btn-dark" onclick="leaveRoom()">გასვლა</button>
</div>

<!-- ═══ JOIN ═══ -->
<div class="screen join" id="joinScreen">
  <h2>შეიყვანე კოდი</h2>
  <div class="code-input" id="codeInput">
    <input type="text" maxlength="1" inputmode="text" autocapitalize="characters">
    <input type="text" maxlength="1" inputmode="text" autocapitalize="characters">
    <input type="text" maxlength="1" inputmode="text" autocapitalize="characters">
    <input type="text" maxlength="1" inputmode="text" autocapitalize="characters">
  </div>
  <h3 style="margin-top:12px">აირჩიე პერსონაჟი</h3>
  <div class="char-pick" id="charPick"></div>
  <p class="error-msg" id="joinError"></p>
  <button class="btn btn-orange" onclick="doJoin()">შესვლა</button>
  <button class="btn btn-dark" onclick="showScreen('menuScreen')">უკან</button>
</div>

<!-- ═══ GAME ═══ -->
<div class="screen table" id="tableScreen">
  <div class="player-area seat-0" id="seat0"><div class="player-cards" id="hand0"></div><div class="player-label" id="label0"></div></div>
  <div class="player-area seat-1" id="seat1"><div class="player-label" id="label1"></div><div class="player-cards" id="hand1"></div><span class="card-count" id="count1"></span></div>
  <div class="player-area seat-2" id="seat2"><div class="player-label" id="label2"></div><div class="player-cards" id="hand2"></div><span class="card-count" id="count2"></span></div>
  <div class="player-area seat-3" id="seat3"><div class="player-label" id="label3"></div><div class="player-cards" id="hand3"></div><span class="card-count" id="count3"></span></div>

  <div class="center">
    <div class="pile-card draw-pile" id="drawPile" onclick="playerDraw()">აიღე<br>🦈</div>
    <div class="pile-card" id="discardPile"></div>
  </div>

  <button class="uno-btn" id="unoBtn" onclick="callUno()">UNO!</button>

  <div class="color-picker" id="colorPicker">
    <h3>აირჩიე ფერი 💅</h3>
    <div class="color-options">
      <div class="color-option red" onclick="pickColor('red')"></div>
      <div class="color-option blue" onclick="pickColor('blue')"></div>
      <div class="color-option green" onclick="pickColor('green')"></div>
      <div class="color-option yellow" onclick="pickColor('yellow')"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <div class="game-over" id="gameOver">
    <img class="winner-img" id="winnerImg" src="" alt="">
    <h1 id="winnerText"></h1>
    <button class="btn btn-orange" onclick="backToMenu()">მენიუში 🏠</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════ */
const SB_URL='https://ocywawoybgqzywdbqjgg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jeXdhd295Ymdxenl3ZGJxamdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjIxNjMsImV4cCI6MjA4ODAzODE2M30.t0OC-AXjQ-q5DdS652tbySPLRJQcZS87f4HmaUgIMLw';

const BI='https://www.playbrainrot.org/images/characters/';
const CHARS=[
  {id:'tral',name:'Tralalero',img:BI+'tralalero-tralala.webp'},
  {id:'bomb',name:'Bombardiro',img:BI+'bombardiro-crocodilo.webp'},
  {id:'capp',name:'Cappuccino',img:BI+'cappuccino-assassino.webp'},
  {id:'ball',name:'Ballerina',img:BI+'ballerina-cappuccina.webp'},
  {id:'chim',name:'Chimpanzini',img:BI+'chimpanzini-bananini.webp'},
  {id:'tung',name:'Tung Tung',img:BI+'tung-tung-tung-tung-tung-tung-tung-tung-tung-sahur.webp'},
  {id:'pata',name:'Patapim',img:BI+'brr-brr-patapim.webp'},
  {id:'trip',name:'Trippi Troppi',img:BI+'trippi-troppi.webp'},
];
const CNUMS=[
  {name:'Tralalero',img:BI+'tralalero-tralala.webp'},
  {name:'Bombardiro',img:BI+'bombardiro-crocodilo.webp'},
  {name:'Chimpanzini',img:BI+'chimpanzini-bananini.webp'},
  {name:'Tung Tung',img:BI+'tung-tung-tung-tung-tung-tung-tung-tung-tung-sahur.webp'},
  {name:'Ballerina',img:BI+'ballerina-cappuccina.webp'},
  {name:'Cappuccino',img:BI+'cappuccino-assassino.webp'},
  {name:'Patapim',img:BI+'brr-brr-patapim.webp'},
  {name:'Trippi',img:BI+'trippi-troppi.webp'},
  {name:'Lirilì',img:BI+'liril-laril.webp'},
  {name:'La Vaca',img:BI+'la-vaca-saturno-saturnita.webp'},
];
const SP={skip:{e:'🚫',n:'Skippiro'},reverse:{e:'🔄',n:'Reversiro'},draw2:{e:'➕2',n:'+2iro'},wild:{e:'🌈',n:'Wildiro'},wild4:{e:'🌈➕4',n:'+4iro'}};
const COLS=['red','blue','green','yellow'];

/* ═══════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════ */
let sb=null, chan=null;
let myId=crypto.randomUUID(), myChar=null;
let roomCode='', isHost=false, mySeat=-1;
let players=[];  // [{id,charId,name,img,seat}]
let gs=null;     // game state
let solo=false;
let unoCallable=false, unoTimer=null;

/* ═══════════════════════════════════════════
   SCREENS
   ═══════════════════════════════════════════ */
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function initSB(){if(!sb)sb=window.supabase.createClient(SB_URL,SB_KEY);}

/* ═══ MENU ═══ */
function showCreate(){
  initSB(); isHost=true;
  roomCode=genCode(); myChar=CHARS[0]; mySeat=0;
  players=[{id:myId,charId:myChar.id,name:myChar.name,img:myChar.img,seat:0}];
  document.getElementById('roomCodeEl').textContent=roomCode;
  renderSlots(); showScreen('lobbyScreen'); joinChan();
}
function showJoin(){
  initSB(); isHost=false; myChar=null;
  document.getElementById('joinError').textContent='';
  renderCharPick([]); showScreen('joinScreen');
  const inps=document.querySelectorAll('#codeInput input');
  inps.forEach(i=>{i.value='';});
  setupCodeInps(); inps[0].focus();
}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ';let r='';for(let i=0;i<4;i++)r+=c[Math.floor(Math.random()*c.length)];return r;}

/* ═══ CODE INPUT ═══ */
function setupCodeInps(){
  const inps=document.querySelectorAll('#codeInput input');
  inps.forEach((inp,i)=>{
    inp.oninput=()=>{inp.value=inp.value.toUpperCase().replace(/[^A-Z]/g,'');if(inp.value&&i<3)inps[i+1].focus();};
    inp.onkeydown=(e)=>{if(e.key==='Backspace'&&!inp.value&&i>0)inps[i-1].focus();};
  });
}
function getCode(){return Array.from(document.querySelectorAll('#codeInput input')).map(i=>i.value).join('');}

/* ═══ CHAR PICKER ═══ */
function renderCharPick(taken){
  const el=document.getElementById('charPick'); el.innerHTML='';
  CHARS.forEach(ch=>{
    const d=document.createElement('div');
    const t=taken.includes(ch.id);
    d.className='char-option'+(myChar&&myChar.id===ch.id?' selected':'')+(t?' taken':'');
    d.innerHTML='<img src="'+ch.img+'">';
    if(!t)d.onclick=()=>{myChar=ch;renderCharPick(taken);};
    el.appendChild(d);
  });
}

/* ═══ LOBBY SLOTS ═══ */
function renderSlots(){
  const el=document.getElementById('playerSlots'); el.innerHTML='';
  for(let i=0;i<4;i++){
    const p=players.find(pp=>pp.seat===i);
    const d=document.createElement('div');
    if(p){d.className='player-slot filled'+(p.id===myId?' you':'');d.innerHTML='<img src="'+p.img+'"><div class="slot-name">'+p.name+(p.id===myId?' (შენ)':'')+'</div>';}
    else{d.className='player-slot';d.innerHTML='<div class="slot-empty">?</div><div class="slot-name">ცარიელი</div>';}
    el.appendChild(d);
  }
  document.getElementById('startBtn').style.display=(isHost&&players.length>=2)?'':'none';
}

/* ═══ SUPABASE CHANNEL ═══ */
function joinChan(){
  if(chan){sb.removeChannel(chan);chan=null;}
  chan=sb.channel('uno-'+roomCode,{config:{broadcast:{self:false}}});

  chan.on('broadcast',{event:'pjoin'},({payload:p})=>{
    if(isHost&&players.length<4&&!players.find(x=>x.id===p.id)){
      const taken=players.map(x=>x.seat);
      p.seat=[0,1,2,3].find(s=>!taken.includes(s));
      players.push(p);
      renderSlots();
      chan.send({type:'broadcast',event:'plist',payload:{players}});
    }
  });
  chan.on('broadcast',{event:'plist'},({payload:d})=>{
    players=d.players;
    const me=players.find(p=>p.id===myId);
    if(me){mySeat=me.seat;showScreen('lobbyScreen');document.getElementById('roomCodeEl').textContent=roomCode;}
    renderSlots();
  });
  chan.on('broadcast',{event:'gstart'},({payload:d})=>{
    gs=d.state; players=d.players;
    mySeat=(players.find(p=>p.id===myId)||{}).seat||-1;
    solo=false; showScreen('tableScreen'); render();
  });
  chan.on('broadcast',{event:'gstate'},({payload:d})=>{
    gs=d.state; if(d.toast)showToast(d.toast,1200); render(); checkWin();
  });
  chan.on('broadcast',{event:'paction'},({payload:a})=>{if(isHost)handleAction(a);});
  chan.on('broadcast',{event:'pleave'},({payload:d})=>{
    players=players.filter(p=>p.id!==d.id); renderSlots();
    if(isHost)chan.send({type:'broadcast',event:'plist',payload:{players}});
  });
  chan.subscribe();
}

/* ═══ JOIN ROOM ═══ */
function doJoin(){
  const code=getCode();
  if(code.length<4){document.getElementById('joinError').textContent='4 ასო შეიყვანე';return;}
  if(!myChar){document.getElementById('joinError').textContent='აირჩიე პერსონაჟი';return;}
  roomCode=code.toUpperCase(); joinChan();
  setTimeout(()=>{chan.send({type:'broadcast',event:'pjoin',payload:{id:myId,charId:myChar.id,name:myChar.name,img:myChar.img}});},1000);
  document.getElementById('joinError').textContent='ელოდება...';
  setTimeout(()=>{if(mySeat<0)document.getElementById('joinError').textContent='ოთახი ვერ მოიძებნა';},6000);
}
function leaveRoom(){
  if(chan){chan.send({type:'broadcast',event:'pleave',payload:{id:myId}});sb.removeChannel(chan);chan=null;}
  players=[];showScreen('menuScreen');
}

/* ═══════════════════════════════════════════
   GAME LOGIC (shared solo + online)
   ═══════════════════════════════════════════ */
function makeDeck(){
  let d=[];
  for(let c of COLS){d.push({color:c,type:'number',value:0});for(let v=1;v<=9;v++){d.push({color:c,type:'number',value:v});d.push({color:c,type:'number',value:v});}for(let s of['skip','reverse','draw2']){d.push({color:c,type:s});d.push({color:c,type:s});}}
  for(let i=0;i<4;i++){d.push({color:'wild',type:'wild'});d.push({color:'wild',type:'wild4'});}return d;
}
function shuf(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function draw(n){let r=[];for(let i=0;i<n;i++){if(gs.deck.length===0)gs.deck=shuf(makeDeck());r.push(gs.deck.pop());}return r;}
function adv(){gs.currentPlayer=(gs.currentPlayer+gs.direction+gs.np)%gs.np;}
function nxt(){return(gs.currentPlayer+gs.direction+gs.np)%gs.np;}

function makeState(np){
  let deck=shuf(makeDeck()),hands=[];
  for(let i=0;i<np;i++)hands.push([]);
  for(let i=0;i<7;i++)for(let p=0;p<np;p++)hands[p].push(deck.pop());
  let dt; do{dt=deck.pop();}while(dt.type!=='number');
  return{hands,discardTop:dt,currentColor:dt.color,currentPlayer:0,direction:1,deck,np};
}

/* ═══ HOST START ═══ */
function hostStart(){
  gs=makeState(players.length);
  chan.send({type:'broadcast',event:'gstart',payload:{state:gs,players}});
  solo=false; showScreen('tableScreen'); render();
}

/* ═══ HOST: HANDLE ACTION ═══ */
function handleAction(a){
  if(!gs||a.seat!==gs.currentPlayer)return;
  let toast='';
  if(a.type==='play'){
    const card=gs.hands[a.seat].splice(a.cardIndex,1)[0];
    gs.discardTop=card; if(card.color!=='wild')gs.currentColor=card.color;
    if(card.type==='skip'){toast=players[nxt()].name+' გამოტოვა! 🚫';adv();adv();}
    else if(card.type==='reverse'){gs.direction*=-1;toast='რევერსი! 🔄';adv();}
    else if(card.type==='draw2'){let v=nxt();gs.hands[v].push(...draw(2));toast=players[v].name+' +2 აიღო! 😭';adv();adv();}
    else if(card.type==='wild'){bcast(gs,'');return;}
    else if(card.type==='wild4'){let v=nxt();gs.hands[v].push(...draw(4));toast=players[v].name+' +4 აიღო! 💀';bcast(gs,toast);return;}
    else{adv();}
  }else if(a.type==='draw'){gs.hands[a.seat].push(...draw(1));adv();}
  else if(a.type==='pick_color'){gs.currentColor=a.color;if(gs.discardTop.type==='wild4')adv();adv();}
  else if(a.type==='uno_fail'){gs.hands[a.seat].push(...draw(2));toast=players[a.seat].name+' UNO დაავიწყდა! +2 💀';}
  bcast(gs,toast);
}
function bcast(state,toast){
  gs=state; chan.send({type:'broadcast',event:'gstate',payload:{state:gs,toast}});
  if(toast)showToast(toast,1200); render(); checkWin();
}

/* ═══════════════════════════════════════════
   RENDERING
   ═══════════════════════════════════════════ */
function cclass(c){return c.color==='wild'?'card-wild':'card-'+c.color;}
function cimg(c){return c.type==='number'?'<img class="card-img" src="'+CNUMS[c.value].img+'">':SP[c.type].e;}
function clbl(c){return c.type==='number'?CNUMS[c.value].name:SP[c.type].n;}
function canPlay(c){
  if(!gs)return false;if(c.color==='wild')return true;if(c.color===gs.currentColor)return true;
  if(c.type==='number'&&gs.discardTop.type==='number'&&c.value===gs.discardTop.value)return true;
  if(c.type!=='number'&&c.type===gs.discardTop.type)return true;return false;
}

function render(){
  if(!gs)return;
  const np=gs.np, myTurn=gs.currentPlayer===mySeat;
  for(let s=0;s<4;s++)document.getElementById('seat'+s).style.display=s<np?'':'none';

  for(let i=0;i<np;i++){
    const vs=(i-mySeat+np)%np; // visual seat (me always bottom=0)
    const handEl=document.getElementById('hand'+vs);
    const lblEl=document.getElementById('label'+vs);
    const p=players[i];

    lblEl.className='player-label'+(gs.currentPlayer===i?' active':'');
    lblEl.innerHTML='<img class="player-avatar" src="'+p.img+'"> '+p.name+(i===mySeat?' (შენ)':'');

    handEl.innerHTML='';
    if(i===mySeat){
      gs.hands[i].forEach((card,ci)=>{
        const el=document.createElement('div');
        const ok=myTurn&&canPlay(card);
        el.className='card '+cclass(card)+(ok?' playable':'');
        el.innerHTML='<span>'+cimg(card)+'</span><span class="card-label">'+clbl(card)+'</span>';
        const ov=gs.hands[i].length>12?-45:gs.hands[i].length>8?-35:-25;
        el.style.marginLeft=ci>0?ov+'px':'0';
        if(ok)el.onclick=()=>doPlay(ci);
        handEl.appendChild(el);
      });
    }else{
      const mx=Math.min(gs.hands[i].length,10);
      for(let ci=0;ci<mx;ci++){
        const el=document.createElement('div');el.className='card card-back small';
        if(vs===1||vs===3)el.style.marginTop=ci>0?'-30px':'0';
        else el.style.marginLeft=ci>0?'-20px':'0';
        handEl.appendChild(el);
      }
      const cnt=document.getElementById('count'+vs);
      if(cnt)cnt.textContent=gs.hands[i].length+' კარტი';
    }
  }

  const dp=document.getElementById('discardPile');
  dp.className='pile-card '+(gs.discardTop.color==='wild'?'card-'+gs.currentColor:cclass(gs.discardTop));
  dp.innerHTML='<span>'+cimg(gs.discardTop)+'</span><span class="card-label">'+clbl(gs.discardTop)+'</span>';

  document.getElementById('unoBtn').className='uno-btn'+(unoCallable?' visible':'');
}

/* ═══ PLAYER ACTIONS ═══ */
function doPlay(ci){
  if(!gs||gs.currentPlayer!==mySeat)return;
  if(!canPlay(gs.hands[mySeat][ci]))return;
  if(gs.hands[mySeat].length===2)startUnoTimer();
  if(solo){playSolo(mySeat,ci);}
  else if(isHost){handleAction({type:'play',seat:mySeat,cardIndex:ci});}
  else{chan.send({type:'broadcast',event:'paction',payload:{type:'play',seat:mySeat,cardIndex:ci}});}
}
function playerDraw(){
  if(!gs||gs.currentPlayer!==mySeat)return;
  if(solo){gs.hands[mySeat].push(...draw(1));adv();render();if(gs.currentPlayer!==mySeat)setTimeout(botTurn,1500+Math.random()*1200);}
  else if(isHost){handleAction({type:'draw',seat:mySeat});}
  else{chan.send({type:'broadcast',event:'paction',payload:{type:'draw',seat:mySeat}});}
}
function pickColor(color){
  document.getElementById('colorPicker').classList.remove('visible');
  if(solo){gs.currentColor=color;if(gs.discardTop.type==='wild4')adv();adv();render();if(gs.currentPlayer!==mySeat)setTimeout(botTurn,1500+Math.random()*1200);}
  else if(isHost){handleAction({type:'pick_color',seat:mySeat,color});}
  else{chan.send({type:'broadcast',event:'paction',payload:{type:'pick_color',seat:mySeat,color}});}
}
function callUno(){if(!unoCallable)return;unoCallable=false;if(unoTimer){clearTimeout(unoTimer);unoTimer=null;}showToast('UNO! 🔥',1200);render();}

function startUnoTimer(){
  unoCallable=true;render();
  unoTimer=setTimeout(()=>{
    if(!unoCallable)return;unoCallable=false;
    if(solo){gs.hands[mySeat].push(...draw(2));showToast('UNO დაგავიწყდა! +2 💀',1500);render();}
    else if(isHost){handleAction({type:'uno_fail',seat:mySeat});}
    else{chan.send({type:'broadcast',event:'paction',payload:{type:'uno_fail',seat:mySeat}});}
  },3000);
}

function checkWin(){
  if(!gs)return;
  for(let i=0;i<gs.np;i++){
    if(gs.hands[i].length===0){
      document.getElementById('winnerImg').src=players[i].img;
      document.getElementById('winnerText').textContent=i===mySeat?'შენ მოიგე! 🏆':players[i].name+' მოიგო!';
      document.getElementById('gameOver').classList.add('visible');
      return;
    }
  }
}

function showToast(t,d){const el=document.getElementById('toast');el.textContent=t;el.classList.add('visible');setTimeout(()=>el.classList.remove('visible'),d||1500);}

/* ═══════════════════════════════════════════
   SOLO MODE (vs 3 bots)
   ═══════════════════════════════════════════ */
function startSolo(){
  solo=true;isHost=false;mySeat=0;
  players=[
    {id:myId,charId:'tral',name:'Tralalero',img:CHARS[0].img,seat:0},
    {id:'b1',charId:'bomb',name:'Bombardiro',img:CHARS[1].img,seat:1},
    {id:'b2',charId:'capp',name:'Cappuccino',img:CHARS[2].img,seat:2},
    {id:'b3',charId:'ball',name:'Ballerina',img:CHARS[3].img,seat:3},
  ];
  gs=makeState(4); showScreen('tableScreen');
  document.getElementById('gameOver').classList.remove('visible');
  render();
}

function playSolo(p,ci){
  const card=gs.hands[p].splice(ci,1)[0];
  gs.discardTop=card; if(card.color!=='wild')gs.currentColor=card.color;
  if(p!==0&&gs.hands[p].length===1)setTimeout(()=>showToast(players[p].name+' ამბობს UNO! 😱',1200),500);

  if(card.type==='skip'){showToast(players[nxt()].name+' გამოტოვა! 🚫',1200);adv();adv();}
  else if(card.type==='reverse'){gs.direction*=-1;showToast('რევერსი! 🔄',1000);adv();}
  else if(card.type==='draw2'){let v=nxt();gs.hands[v].push(...draw(2));showToast(players[v].name+' +2 აიღო! 😭',1200);adv();adv();}
  else if(card.type==='wild'||card.type==='wild4'){
    if(card.type==='wild4'){let v=nxt();gs.hands[v].push(...draw(4));showToast(players[v].name+' +4 აიღო! 💀',1200);}
    if(p===0){document.getElementById('colorPicker').classList.add('visible');render();return;}
    else{gs.currentColor=botColor(p);if(card.type==='wild4')adv();adv();}
  }else{adv();}

  render();checkWin();
  if(gs.currentPlayer!==0)setTimeout(botTurn,1500+Math.random()*1200);
}

function botTurn(){
  if(!gs||gs.currentPlayer===0)return;
  const p=gs.currentPlayer;
  let ok=[];gs.hands[p].forEach((c,i)=>{if(canPlay(c))ok.push(i);});
  if(ok.length===0){gs.hands[p].push(...draw(1));adv();render();if(gs.currentPlayer!==0)setTimeout(botTurn,1500+Math.random()*1200);return;}
  const pick=ok[Math.floor(Math.random()*ok.length)];
  setTimeout(()=>playSolo(p,pick),800);
}

function botColor(p){
  let c={red:0,blue:0,green:0,yellow:0};
  gs.hands[p].forEach(x=>{if(c[x.color]!==undefined)c[x.color]++;});
  let best='red',mx=0;for(let k of COLS)if(c[k]>mx){mx=c[k];best=k;}return best;
}

function backToMenu(){
  document.getElementById('gameOver').classList.remove('visible');
  if(chan){sb.removeChannel(chan);chan=null;}
  gs=null;players=[];showScreen('menuScreen');
}
</script>
